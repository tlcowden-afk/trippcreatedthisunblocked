<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unblocked Games Hub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0c;
            color: #f4f4f5;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0c;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }
        .aspect-video {
            aspect-ratio: 16 / 9;
        }
        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="antialiased selection:bg-indigo-500/30">
    <div id="app">
        <!-- Header -->
        <header class="sticky top-0 z-40 border-b border-white/5 bg-[#0a0a0c]/80 backdrop-blur-xl">
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
                <div id="logo" class="flex items-center gap-2 cursor-pointer group">
                    <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20 group-hover:scale-110 transition-transform">
                        <i data-lucide="gamepad-2" class="w-6 h-6 text-white"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight hidden sm:block">
                        Unblocked<span class="text-indigo-500">Games</span>
                    </h1>
                </div>

                <div class="flex-1 max-w-md relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500"></i>
                    <input
                        id="search-input"
                        type="text"
                        placeholder="Search games..."
                        class="w-full bg-white/5 border border-white/10 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all text-sm"
                    />
                </div>

                <div class="flex items-center gap-4">
                    <button class="text-xs font-medium uppercase tracking-wider text-zinc-400 hover:text-white transition-colors hidden md:block">
                        Newest
                    </button>
                    <button class="text-xs font-medium uppercase tracking-wider text-zinc-400 hover:text-white transition-colors hidden md:block">
                        Popular
                    </button>
                </div>
            </div>
        </header>

        <main id="main-content" class="max-w-7xl mx-auto px-4 py-8">
            <!-- Content will be injected here -->
        </main>

        <!-- Footer -->
        <footer class="border-t border-white/5 py-12 mt-20">
            <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-8">
                <div class="flex items-center gap-2">
                    <i data-lucide="gamepad-2" class="w-6 h-6 text-indigo-500"></i>
                    <span class="font-bold">Unblocked Hub</span>
                </div>
                <div class="flex gap-8 text-sm text-zinc-500">
                    <a href="#" class="hover:text-white transition-colors">Terms</a>
                    <a href="#" class="hover:text-white transition-colors">Privacy</a>
                    <a href="#" class="hover:text-white transition-colors">Contact</a>
                </div>
                <p class="text-sm text-zinc-600">
                    &copy; 2024 Unblocked Games Hub. All rights reserved.
                </p>
            </div>
        </footer>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
